<app-breadcrumb pageName="Past Sessions"></app-breadcrumb>

<section class="past-sessions-page section">
  <div class="container">
    <div class="sessions-grid">
      @for (session of sessions; track session.title; let i = $index) {
        <div class="session-card card">
          <div class="session-thumbnail">
            @if (playingIndex === i) {
              <iframe [src]="getEmbedUrl(session.videoId)" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            } @else {
              <img [src]="'https://img.youtube.com/vi/' + session.videoId + '/hqdefault.jpg'" [alt]="session.title">
              <div class="play-overlay" (click)="playVideo(i)">
                <i class="fas fa-play"></i>
              </div>
            }
          </div>
          <div class="session-info">
            <h4>{{ session.title }}</h4>
            <div class="session-meta">
              <span><i class="fas fa-user"></i> {{ session.speaker }}</span>
              <span><i class="fas fa-calendar"></i> {{ session.date }}</span>
            </div>
            <div class="stars">
              @for (s of getStars(session.rating); track $index) {
                <i class="fas fa-star" [style.color]="s ? '#f39c12' : '#ddd'"></i>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
