<div class="registration-form" [class.compact]="compact">
  <h3>{{ title }}</h3>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Name *" required>
    </div>
    <div class="form-group">
      <input type="text" [(ngModel)]="formData.companyName" name="companyName" placeholder="Company Name *" required>
    </div>
    <div class="form-group">
      <input type="text" [(ngModel)]="formData.country" name="country" placeholder="Country *" required>
    </div>
    <div class="form-group">
      <input type="tel" [(ngModel)]="formData.contactNumber" name="contactNumber" placeholder="Contact Number *" required>
    </div>
    <div class="form-group">
      <input type="email" [(ngModel)]="formData.email" name="email" placeholder="Email *" required>
    </div>
    <button type="submit" class="btn btn-primary submit-btn">
      Register Now <i class="fas fa-arrow-right"></i>
    </button>
  </form>
</div>
