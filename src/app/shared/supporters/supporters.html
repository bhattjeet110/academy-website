<section class="supporters section">
  <div class="container">
    <div class="supporters-content">
      <div class="supporters-text">
        <span class="section-label">OUR KEY SUPPORTERS</span>
        <h2 class="section-title">Learn with Our Key Supporters</h2>
        <div class="section-divider"></div>
        <ul class="supporters-features">
          <li><i class="fas fa-hospital"></i> Leading Multispeciality Hospitals</li>
          <li><i class="fas fa-globe"></i> International Patient Care Centers</li>
          <li><i class="fas fa-award"></i> Accredited Healthcare Institutions</li>
          <li><i class="fas fa-handshake"></i> Healthcare Partners from our Countries</li>
        </ul>
      </div>
      <div class="supporters-grid">
        @for (supporter of supporters; track supporter.name) {
          <div class="supporter-card">
            <img [src]="supporter.image" [alt]="supporter.name">
            <span>{{ supporter.name }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
